<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Rose.png">
<title>Social Habits and Peer Feedback Questionnaire</title>
<style>
/* =======================================================================
   RESET & GENERAL
======================================================================= */
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; width:100%; overflow-x:hidden; font-family:'Arial',sans-serif; }
body { background:#f4f4f4; transition: background 0.8s ease; }
body.red-mode { background:#c4001a; }

/* =======================================================================
   SCREEN & CARD
======================================================================= */
.screen { position:fixed; inset:0; display:flex; justify-content:center; align-items:center; padding:15px; }
.card { background: rgba(255,255,255,0.97); border-radius:25px; box-shadow:0 12px 35px rgba(0,0,0,0.25); text-align:center; padding:25px; width:100%; max-width:480px; transition: transform 1s ease, opacity 1s ease; }
.card.small { min-height:220px; }

.title { font-size:1.6rem; color:#222; margin-bottom:12px; }
.subtitle { font-size:0.95rem; color:#555; margin-bottom:18px; }
input { width:100%; padding:12px 14px; font-size:1rem; border:1.5px solid #ccc; border-radius:12px; margin-bottom:15px; outline:none; }
input:focus { border-color:#ff5c73; box-shadow:0 0 0 3px rgba(255,92,115,0.15); }

.btn { padding:14px 16px; width:100%; border:none; border-radius:12px; font-size:1rem; cursor:pointer; color:white; background:linear-gradient(135deg,#ff4d6d,#b8002a); transition:0.25s; }
.btn:hover { filter:brightness(1.05); }
.btn:active { transform:scale(0.98); }

.hidden { display:none !important; }

/* =======================================================================
   TYPING EFFECT
======================================================================= */
.typing-wrap { position:absolute; left:50%; top:48%; transform:translate(-50%,-50%); width:90%; max-width:480px; text-align:center; z-index:4; opacity:0; pointer-events:none; transition: transform 1s ease, opacity 1s ease; }
.typing-text { font-size:clamp(1.1rem,4vw,1.6rem); color:white; text-shadow:0 2px 8px rgba(0,0,0,0.25); min-height:3rem; white-space:pre-wrap; letter-spacing:0.3px; }

/* =======================================================================
   HEART CHOICES
======================================================================= */
.choices { position:fixed; inset:0; z-index:6; pointer-events:none; }
.heart-choice { position:absolute; font-size:80px; border:none; background:transparent; cursor:pointer; pointer-events:auto; color:#ffefef; text-shadow:0 4px 12px rgba(0,0,0,0.28); transform:translate(-50%,-50%) scale(0.2); opacity:0; transition: all 0.8s ease; border-radius:50%; }
.heart-choice.circle { border-radius:50%; font-size:70px; }
.heart-choice.square { border-radius:12px; font-size:80px; }
.heart-choice.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

/* =======================================================================
   CONFESSION MESSAGE
======================================================================= */
.message-card { position:fixed; left:50%; bottom:20px; transform:translateX(-50%) translateY(30px); width:90%; max-width:440px; background:rgba(255,255,255,0.96); color:#222; border-radius:18px; padding:18px; box-shadow:0 12px 25px rgba(0,0,0,0.25); z-index:20; opacity:0; pointer-events:none; transition: all 0.45s ease; }
.message-title { color:#b8002a; font-size:1.25rem; margin-bottom:8px; }
.message-text { font-size:1rem; line-height:1.5; min-height:3rem; }

/* =======================================================================
   FLOATING WHITE HEARTS
======================================================================= */
.floating-heart { position:fixed; pointer-events:none; z-index:12; font-size:18px; color:white; text-shadow:0 0 10px rgba(255,255,255,0.7); animation:floatUp linear forwards; user-select:none; }
@keyframes floatUp { from{transform:translateY(0) scale(0.8);opacity:1;} to{transform:translateY(-220px) scale(1.5);opacity:0;} }

/* =======================================================================
   RESPONSIVE TOUCH ADJUSTMENTS
======================================================================= */
@media (max-width:480px){
  .title { font-size:1.4rem; }
  .subtitle { font-size:0.85rem; }
  .btn { font-size:0.95rem; padding:12px; }
  input { font-size:0.95rem; padding:10px 12px; }
  .heart-choice { font-size:60px; }
  .heart-choice.circle { font-size:55px; }
  .heart-choice.square { font-size:60px; }
  .message-card { width:95%; padding:15px; }
  .message-title { font-size:1.15rem; }
  .message-text { font-size:0.95rem; }
}
</style>
</head>
<body>
  <!-- BACKGROUND MUSIC -->
  <audio id="bgMusic" src="a-sky-full-of-stars-piano-cover (1).mp3" loop></audio>

  <!-- NAME INPUT -->
  <div class="screen" id="startScreen">
    <div class="card small" id="nameCard">
      <div class="title">Social Habits and Peer Feedback Questionnaire</div>
      <input type="text" id="nameInput" placeholder="Please enter your name here..." />
      <button class="btn" id="nextBtn">Next</button>
      <div class="subtitle"></div>
      <div class="subtitle">Any information you provide will be held in utmost confidentiality.</div>
    </div>
  </div>

  <!-- TYPING EFFECT -->
  <div class="typing-wrap" id="typingWrap">
    <div class="typing-text" id="typingText"></div>
  </div>

  <!-- HEART CHOICES -->
  <div class="choices hidden" id="choicesLayer"></div>

  <!-- CONFESSION MESSAGE -->
  <div class="message-card" id="messageCard">
    <h3 class="message-title" id="messageTitle">Message</h3>
    <p class="message-text" id="messageText"></p>
  </div>

<script>
const nameInput = document.getElementById("nameInput");
const nextBtn = document.getElementById("nextBtn");
const startScreen = document.getElementById("startScreen");
const typingWrap = document.getElementById("typingWrap");
const typingText = document.getElementById("typingText");
const choicesLayer = document.getElementById("choicesLayer");
const messageCard = document.getElementById("messageCard");
const messageTitle = document.getElementById("messageTitle");
const messageText = document.getElementById("messageText");
const bgMusic = document.getElementById("bgMusic");

let floatingInterval = null;
let spawnRate = 120;

// --- HEARTS DATA
const heartsData = [
  {label:"❤", type:"circle", title:"I", message:"Hello po, sana nagustuhan n’yo yung simpleng pakulo ko ngayon. ..."},
  {label:"❤", type:"square", title:"APPLICATION RESUME ", message:"Name: Francis De La Torre\nPosition Applied For: Potential Boyfriend..."},
  {label:"❤", type:"circle", title:"U", message:"Medyo natatakot po ako na baka mali ang timing ko..."}
];

let typingTimer;

function typeMessage(text, el, speed=150, done){
  el.textContent="";
  let i=0;
  clearInterval(typingTimer);
  typingTimer=setInterval(()=>{
    el.textContent+=text[i]; i++;
    if(i>=text.length){ clearInterval(typingTimer); if(done) done(); }
  }, speed);
}

function showTypingSequence(){
  document.body.classList.add("red-mode");
  startScreen.classList.add("hidden");
  typingWrap.classList.add("show");
  typeMessage("Hello po...\n Sorry po sa scam hehehe \n wala po talagang survey... \n naisip ko lang pong mag gawa po ng site \n kasi nahihiya po ako hahaha \n uhm... \n So... \n Pili lang po kayo sa tatlo...", typingText, 70, ()=>{
    setTimeout(()=>{
      typingWrap.classList.add("move-up");
      setTimeout(showHearts, 600);
    }, 700);
  });
}

function showHearts(){
  choicesLayer.classList.remove("hidden");
  choicesLayer.innerHTML="";
  const viewportW = window.innerWidth;
  const viewportH = window.innerHeight;

  const spacing = viewportW / (heartsData.length + 1);

  heartsData.forEach((item,index)=>{
    const heart = document.createElement("button");
    heart.className="heart-choice "+item.type;
    heart.innerHTML=item.label;
    heart.title=item.title;

    heart.style.left=`${spacing*(index+1)}px`;
    heart.style.top=`${viewportH/2}px`;

    setTimeout(()=>heart.classList.add("show"),50);

    heart.addEventListener("click",()=>{
      heart.classList.add("clicked");
      spawnWhiteHeartsContinuously();
      spawnRate = Math.max(100, spawnRate - 20);
      showConfession(item.title, item.message);
    });

    choicesLayer.appendChild(heart);
  });
}

function showConfession(title,message){
  messageTitle.textContent=title;
  messageCard.classList.add("show");
  typeMessage(message,messageText,35);
}

function spawnWhiteHeartsContinuously(){
  if(floatingInterval) return;
  floatingInterval=setInterval(()=>{
    const h=document.createElement("div");
    h.className="floating-heart";
    h.textContent=Math.random()>0.5?"❤":"♡";
    h.style.left=`${Math.random()*window.innerWidth}px`;
    h.style.top=`${Math.random()*window.innerHeight}px`;
    h.style.fontSize=`${14+Math.random()*28}px`;
    h.style.animationDuration=`${1.8+Math.random()*2}s`;
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  }, spawnRate);
}

nextBtn.addEventListener("click",()=>{
  const name=nameInput.value.trim();
  if(!name){ nameInput.focus(); return; }

  // Play background music
  bgMusic.play().catch(err => console.log("Autoplay blocked:", err));

  showTypingSequence();
});

nameInput.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") nextBtn.click();
});
</script>
</body>
</html>
